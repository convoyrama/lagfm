name: Build Mobile (Android)
on:
  push:
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-build.yml'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Publish as a formal GitHub Release?'
        required: true
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: extract version
        id: get_version
        run: |
          VERSION=$(node -p "require('./apps/mobile/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install dependencies
        run: npm install

      - name: build frontend
        env:
          VITE_DATA_URL: ${{ vars.VITE_DATA_URL || 'https://convoyrama.github.io/lagfm' }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://convoyrama.github.io' }}
        run: |
          cd apps/mobile
          npm run build

      - name: capacitor sync
        run: |
          cd apps/mobile
          npx cap sync android

      - name: build apk
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/LAGFM_v${{ steps.get_version.outputs.VERSION }}.apk

      - name: upload apk
        uses: actions/upload-artifact@v4
        with:
          name: LAGFM-Mobile-Android
          path: apps/mobile/android/app/build/outputs/apk/debug/LAGFM_v${{ steps.get_version.outputs.VERSION }}.apk

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: LAGFM-Mobile-Android
          path: release-assets
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.apk
          tag_name: mobile-v${{ needs.build.outputs.version }}
          name: LAGFM Mobile Build v${{ needs.build.outputs.version }}
          body: "Manual build for Android. Version ${{ needs.build.outputs.version }} verified and released by CONVOYRAMA."
          draft: false
          prerelease: false
