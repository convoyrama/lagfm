name: Build Desktop (Windows & Linux)
on:
  push:
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Publish as a formal GitHub Release?'
        required: true
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--bundles msi'
          - platform: 'ubuntu-latest'
            args: '--bundles appimage'

    runs-on: ${{ matrix.platform }}
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: extract version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: build tauri app
        env:
          NO_STRIP: 1
          VITE_DATA_URL: ${{ vars.VITE_DATA_URL || 'https://convoyrama.github.io/lagfm' }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://convoyrama.github.io' }}
        run: |
          cd apps/desktop
          npm run tauri build -- ${{ matrix.args }}

      - name: collect binaries
        shell: bash
        run: |
          mkdir -p final-binaries
          find apps/desktop/src-tauri/target/release/bundle -name "*.msi" -exec cp {} final-binaries/ \;
          find apps/desktop/src-tauri/target/release/bundle -name "*.AppImage" -exec cp {} final-binaries/ \;
          ls -R final-binaries

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LAGFM-Desktop-${{ matrix.platform }}
          path: final-binaries/

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: LAGFM-Desktop-*
          merge-multiple: true
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          tag_name: desktop-v${{ needs.build.outputs.version }}
          name: LAGFM Desktop Build v${{ needs.build.outputs.version }}
          body: "Manual build for Windows and Linux. Version ${{ needs.build.outputs.version }} verified and released by CONVOYRAMA."
          draft: false
          prerelease: false
